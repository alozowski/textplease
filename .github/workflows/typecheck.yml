name: Type check

on:
  push:
    paths:
      - "textplease/**"
      - ".github/workflows/typecheck.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "textplease/**"
      - ".github/workflows/typecheck.yml"
      - "pyproject.toml"
      - "uv.lock"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"

      - name: Run ty
        run: uv run --isolated --locked --only-group dev ty check textplease/
