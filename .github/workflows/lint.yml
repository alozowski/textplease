name: Ruff

on:
  push:
    paths:
      - "textplease/**"
      - "tests/**"
      - ".github/workflows/lint.yml"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "textplease/**"
      - "tests/**"
      - ".github/workflows/lint.yml"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"

      - name: Ruff check
        run: uv run --isolated --locked --only-group dev ruff check .

      - name: Ruff format
        run: uv run --isolated --locked --only-group dev ruff format --check .
