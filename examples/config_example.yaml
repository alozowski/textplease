# Audio source: https://www.kaggle.com/datasets/mathurinache/the-lj-speech-dataset
input_path: "examples/LJSpeech-001.mp3"
output_path: "examples/LJSpeech-001_transcript.csv"

# ASR model — multilingual Whisper: "openai/whisper-large-v3"
model_name: "openai/whisper-large-v3"
device: "cpu"   # "auto" for the best available device, "cuda" for NVIDIA, "mps" for Apple Silicon
language: "en"  # language code (97+ languages supported)

# Segmentation
similarity_threshold: 0.75  # [0.0–1.0] cosine similarity required to merge two segments
pause_threshold: 2.0        # silence (seconds) that forces a split; also sets Silero-VAD boundary
min_segment_words: 3        # segments below this are merged with a neighbour
min_segment_chars: 15       # segments below this are merged with a neighbour
max_segment_words: 100      # segments above this are split regardless of other settings

# Embedding model used for semantic similarity (segmentation step)
embedding_model: "all-MiniLM-L6-v2"

# Performance
performance:
  similarity_batch_size: 32  # batch size for pre-encoding segment embeddings
  chunk_size: 1000           # process segments in chunks of this size (0 = no chunking)

# Logging
log_level: "INFO"  # DEBUG, INFO, WARNING, ERROR

# Optional environment variable overrides
environment:
  PYTORCH_MPS_HIGH_WATERMARK_RATIO: "0.0"  # prevent MPS from hoarding memory on Apple Silicon
  OMP_NUM_THREADS: "8"
  TOKENIZERS_PARALLELISM: "false"
